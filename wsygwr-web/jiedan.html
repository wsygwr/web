<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>养成 · 朱子昊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Microsoft YaHei", -apple-system, sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ============ 整张图铺满（无背景） ============ */
  .stage { position: fixed; inset: 0; overflow: hidden; }

  /* 角色图片作为页面背景（铺满） */
  .bg-full {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: url('char.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    /* 时段调色 */
    transition: filter 1.5s;
  }
  body.morning .bg-full { filter: brightness(1.1) saturate(1.1) hue-rotate(-10deg); }
  body.noon .bg-full { filter: brightness(1.05) saturate(1.2); }
  body.evening .bg-full { filter: brightness(0.85) saturate(1.3) hue-rotate(15deg); }
  body.night .bg-full { filter: brightness(0.55) saturate(0.7) hue-rotate(20deg); }

  /* 整页遮罩已删除 — 图片直接铺满 */

  /* 角色立绘区（小头像在右上角） */
  .character-stage {
    position: fixed;
    top: 90px;
    right: 14px;
    width: 80px;
    height: 80px;
    z-index: 10;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: filter 0.5s;
  }
  body.night .character-stage { filter: brightness(0.7) saturate(0.8); }
  body.angry .character-stage { filter: hue-rotate(-15deg) saturate(1.3); }
  body.happy .character-stage { filter: brightness(1.05) saturate(1.2); }
  body.shy .character-stage { filter: hue-rotate(20deg) brightness(1.1); }
  .character-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    animation: charIdle 3s ease-in-out infinite;
    cursor: pointer;
  }@keyframes charIdle {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-4px) scale(1.01); }
  }
  .character-img:active {
    animation: charTalk 0.4s ease;
  }
  @keyframes charTalk {
    0%, 100% { transform: scale(1.01) translateY(-4px); }
    30% { transform: scale(1.06) translateY(-10px) rotate(-2deg); }
    60% { transform: scale(1.04) translateY(-6px) rotate(2deg); }
  }

  .floating-hearts { position: absolute; inset: 0; pointer-events: none; z-index: 12; }
  .heart {
    position: absolute; font-size: 28px;
    animation: heartFloat 3s ease-out forwards;
    opacity: 0;
  }
  @keyframes heartFloat {
    0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx), -200px) scale(1.2) rotate(20deg); }
  }

  .sparkle-layer { position: absolute; inset: 0; pointer-events: none; z-index: 11; display: none; }
  body.shy .sparkle-layer { display: block; }
  .sparkle {
    position: absolute; width: 6px; height: 6px;
    background: #fbbf24; border-radius: 50%;
    box-shadow: 0 0 10px #fbbf24;
    animation: sparkleAnim 1.5s ease-in-out infinite;
  }
  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
  }
  .sparkle:nth-child(1) { top: 15%; left: 15%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: 25%; right: 15%; animation-delay: 0.3s; }
  .sparkle:nth-child(3) { top: 50%; left: 5%; animation-delay: 0.6s; }
  .sparkle:nth-child(4) { top: 60%; right: 5%; animation-delay: 0.9s; }
  .sparkle:nth-child(5) { top: 80%; left: 45%; animation-delay: 1.2s; }

  /* ============ 顶部接单入口 ============ */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 30;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  }
  .top-bar .back-link {
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    background: rgba(0,0,0,0.3);
    padding: 6px 12px;
    border-radius: 16px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .top-bar .order-link {
    color: #fbbf24;
    text-decoration: none;
    font-size: 12px;
    background: linear-gradient(135deg, rgba(251,191,36,0.2) 0%, rgba(236,72,153,0.2) 100%);
    padding: 6px 12px;
    border-radius: 16px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(251,191,36,0.4);
    font-weight: 600;
  }
  .top-bar .order-link::before { content: "💼 "; }

  /* HUD */
  .hud {
    position: fixed;
    top: 50px;
    left: 14px;
    z-index: 20;
  }
  .hud-box {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #cbd5e0;
    min-width: 130px;
  }
  .hud-box .label { color: #94a3b8; font-size: 10px; }
  .hud-box .val { color: #fbbf24; font-weight: bold; font-size: 14px; }
  .affection-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  .affection-fill {
    height: 100%;
    background: linear-gradient(90deg, #fda4af 0%, #ec4899 50%, #be185d 100%);
    transition: width 0.5s;
    width: 50%;
  }
  .affection-stage { color: #ec4899; font-size: 11px; margin-top: 2px; }

  .hud-right {
    position: fixed;
    top: 50px;
    right: 14px;
    z-index: 20;
    text-align: right;
  }
  .hud-time { font-size: 12px; color: #cbd5e0; background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 6px; }
  .hud-status { font-size: 11px; color: #94a3b8; margin-top: 4px; }

  /* 音乐按钮 */
  .music-btn {
    position: fixed;
    right: 14px;
    top: 110px;
    width: 36px; height: 36px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    z-index: 25;
    backdrop-filter: blur(8px);
  }

  /* ============ 底部快捷按钮 ============ */
  .quick-actions {
    position: fixed;
    bottom: 140px;
    left: 0; right: 0;
    z-index: 15;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 14px;
  }
  .quick-btn {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 50%;
    width: 48px; height: 48px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .quick-btn:active { transform: scale(0.9); }
  .quick-btn .badge {
    position: absolute;
    top: 2px; right: 2px;
    font-size: 9px;
    background: #fbbf24;
    color: #000;
    border-radius: 8px;
    padding: 0 4px;
    font-weight: bold;
  }

  /* ============ Galgame 对话框 ============ */
  .dialog-box {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(180deg, rgba(15, 20, 35, 0.85) 0%, rgba(15, 20, 35, 0.95) 100%);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(99, 102, 241, 0.3);
    padding: 14px 20px 16px;
    min-height: 130px;
  }
  .char-name {
    display: inline-block;
    background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
    color: #fff;
    padding: 4px 14px;
    border-radius: 6px 6px 6px 0;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .dialog-text {
    color: #fff;
    font-size: 15px;
    line-height: 1.7;
    min-height: 50px;
    max-height: 240px;
    overflow-y: auto;
  }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

  /* ============ 底部接单横幅 ============ */
  .upsell-bar {
    position: fixed;
    bottom: 132px;
    left: 0; right: 0;
    z-index: 18;
    background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
    padding: 8px 14px;
    text-align: center;
    font-size: 12px;
    color: #fff;
    display: none;
  }
  .upsell-bar.show { display: block; }
  .upsell-bar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    border-bottom: 1px dashed #fff;
  }

  /* ============ 全部动作菜单 ============ */
  .all-actions {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .all-actions.show { display: flex; }
  .all-actions-box {
    background: linear-gradient(180deg, rgba(15, 20, 35, 0.95) 0%, rgba(15, 20, 35, 0.98) 100%);
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .all-actions-title { color: #fbbf24; font-size: 14px; text-align: center; margin-bottom: 12px; }
  .all-actions-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .all-actions-grid .action-btn {
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.4);
    color: #fff;
    border-radius: 10px;
    padding: 10px 4px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .all-actions-grid .action-btn .icon { font-size: 22px; }
  .all-actions-grid .action-btn .delta { font-size: 9px; color: #fbbf24; }
  .all-actions-grid .action-btn.negative .delta { color: #ef4444; }

  /* 浮动数字 */
  .float-num {
    position: fixed;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    pointer-events: none;
    z-index: 35;
    animation: floatUp 1.5s ease-out forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -200%) scale(1); }
  }

  /* 剧情选项 */
  .choice-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
  }
  .choice-overlay.show { display: flex; }
  .choice-box {
    background: linear-gradient(180deg, rgba(15, 20, 35, 0.95) 0%, rgba(15, 20, 35, 0.98) 100%);
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 12px;
    padding: 24px;
    max-width: 360px;
    width: 90%;
  }
  .choice-title { color: #fbbf24; font-size: 14px; margin-bottom: 16px; text-align: center; }
  .choice-option {
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.4);
    color: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .choice-option:hover, .choice-option:active {
    background: rgba(99, 102, 241, 0.5);
    transform: translateX(4px);
  }
</style>
</head>
<body>
<div class="stage">

<script>
let state = JSON.parse(localStorage.getItem('zihuGame') || 'null') || {
  affection: 15,  // 初始低
  mood: 'normal',
  energy: 100,
  day: 1,
  lastVisit: Date.now(),
  recentActions: [],
  lastActions: {},
  musicOn: false,
  _shownChoices: [],
};

function save() { localStorage.setItem('zihuGame', JSON.stringify(state)); }
function reset() {
  if (confirm('确定要清空存档从头开始吗？')) {
    localStorage.removeItem('zihuGame');
    location.reload();
  }
}

function getTimePeriod() {
  const h = new Date().getHours();
  if (h < 6) return 'night';
  if (h < 11) return 'morning';
  if (h < 18) return 'noon';
  if (h < 22) return 'evening';
  return 'night';
}
function getGreeting() {
  return { morning: '早安', noon: '午安', evening: '晚安', night: '夜深了' }[getTimePeriod()];
}
function getStage(aff) {
  if (aff < 20) return '陌生人';
  if (aff < 40) return '认识中';
  if (aff < 60) return '熟人';
  if (aff < 75) return '朋友';
  if (aff < 90) return '暧昧';
  return '恋人';
}
function getMood(aff) {
  if (aff < 20) return 'angry';
  if (aff < 40) return 'normal';
  if (aff < 60) return 'tsundere';
  if (aff < 80) return 'happy';
  return 'shy';
}
function getStatusText(mood) {
  return {
    angry: '正生着气', normal: '正在发呆', tsundere: '假装不在意',
    happy: '有点开心', shy: '害羞中',
  }[mood];
}

// 随时间衰减（每次动作前检查，每小时 -1）
function applyDecay() {
  const now = Date.now();
  const hours = (now - state.lastVisit) / (1000 * 60 * 60);
  if (hours > 1) {
    const decay = Math.floor(hours);
    state.affection = Math.max(0, state.affection - decay);
  }
  state.lastVisit = now;
}

function calcDelta(action) {
  const a = ACTIONS.find(x => x.id === action.id);
  if (!a) return 0;
  const now = Date.now();
  const elapsed = now - (state.lastActions[action.id] || 0);
  // 冷却 3 秒内减半
  const cooldownMult = elapsed < 3000 ? 0.5 : 1;
  // 连续 3 次以上衰减
  const recentCount = state.recentActions.filter(x => x === action.id).length;
  const repeatMult = recentCount >= 3 ? 0.5 : 1;
  // 心情系数缩小
  const mood = getMood(state.affection);
  let moodMult = 1;
  if (mood === 'happy') moodMult = 1.2;
  else if (mood === 'shy') moodMult = 1.1;
  else if (mood === 'angry') moodMult = 0.5;
  // 随机波动 0.5~1.5
  const rand = 0.5 + Math.random();
  // 暴击 10%
  let crit = 1;
  if (Math.random() < 0.1) crit = 2;
  const raw = a.base * rand * moodMult * cooldownMult * repeatMult * crit;
  return raw > 0 ? Math.max(1, Math.round(raw)) : Math.round(raw);
}

function pickDialog(action) {
  const period = getTimePeriod();
  // 新加的负向动作复用 tease 对话
  const actionKey = ['ignore','scold','trick'].includes(action) ? 'tease' : action;
  const pool = DIALOGS[period][actionKey] || DIALOGS[period].greet;
  let d = pool[Math.floor(Math.random() * pool.length)];
  // 偶尔加个语气词前缀
  if (Math.random() < 0.3) {
    const prefix = { jp: ['ん…', 'あ…', 'あの…', 'あのさ…', '…'], zh: ['嗯…', '啊…', '那个…', '话说…', '…'] }[
      Math.floor(Math.random() * 5)
    ];
    d = { jp: prefix[0] + d.jp, zh: prefix[1] + d.zh };
  }
  return d;
}

// ============ Galgame 音乐提示音（短旋律） ============
let _sfx = null;
async function sfx() {
  if (!_sfx) {
    try { _sfx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ return null; }
  }
  if (_sfx.state==='suspended') await _sfx.resume();
  return _sfx.state==='running' ? _sfx : null;
}

function playTone(ctx, freq, start, dur, type, vol, ramp) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(vol, start + 0.02);
  gain.gain.setValueAtTime(vol, start + dur * (ramp || 0.6));
  gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(start); osc.stop(start + dur);
}

async function playMoodBlip() {
  const ctx = await sfx(); if (!ctx) return;
  const t = ctx.currentTime;
  const mood = getMood(state.affection);
  const action = state._lastAction || 'greet';
  let override = null;
  if (action==='tease'||action==='scold'||action==='ignore'||action==='trick') override='angry';
  if (action==='praise') override='shy';
  if (action==='touch') override='shy';
  if (action==='kiss') override='shy';
  if (action==='gift') override='happy';
  const emo = override || mood;

  if (emo === 'angry') {
    playTone(ctx, 180, t, 0.18, 'sawtooth', 0.15, 0.5);
    playTone(ctx, 215, t + 0.06, 0.15, 'sawtooth', 0.12, 0.5);
  } else if (emo === 'normal') {
    playTone(ctx, 523, t, 0.25, 'triangle', 0.18, 0.7);
  } else if (emo === 'tsundere') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(440, t);
    osc.frequency.linearRampToValueAtTime(350, t + 0.2);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.28);
  } else if (emo === 'happy') {
    [523, 659, 784, 1047].forEach((f, i) => {
      playTone(ctx, f, t + i * 0.07, 0.25, 'sine', 0.12, 0.6);
    });
  } else if (emo === 'shy') {
    playTone(ctx, 587, t, 0.25, 'sine', 0.12, 0.7);
    playTone(ctx, 554, t + 0.12, 0.35, 'sine', 0.1, 0.7);
  }
}

// 打字机（中日双语同时显示）

function typeText(dialog, cb) {
  const el = document.getElementById('dialogText');
  if (typeTimer) clearInterval(typeTimer);
  let i = 0;
  const jp = dialog.jp, zh = dialog.zh;
  typeTimer = setInterval(() => {
    if (i >= jp.length) {
      clearInterval(typeTimer);
      el.innerHTML = `<div style="color:#fbbf24;font-size:16px;line-height:1.6;font-weight:500;">${jp}</div><div style="color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px;line-height:1.5;">${zh}</div>`;
      if (cb) cb();
      return;
    }
    el.innerHTML = `<div style="color:#fbbf24;font-size:16px;line-height:1.6;font-weight:500;">${jp.substring(0, i + 1)}<span style="animation:blink 1s infinite;">▌</span></div><div style="color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px;line-height:1.5;">${zh}</div>`;
    i++;
  }, 60);
}
function skipType() {
  if (typeTimer) {

  }
}

function doAction(a) {
  applyDecay();  // 时间衰减
  state._lastAction = a.id;
  const actualDelta = calcDelta(a);
  state.affection = Math.max(0, Math.min(100, state.affection + actualDelta));
  state.recentActions.push(a.id);
  if (state.recentActions.length > 5) state.recentActions.shift();
  state.lastActions[a.id] = Date.now();
  if (a.id === 'sleep') {
    if (Date.now() - state.lastVisit > 12 * 3600 * 1000) state.day++;
  }
  const dialog = pickDialog(a.id);
  state._lastDialog = dialog;
  typeText(dialog);
  playMoodBlip();  // Galgame 语气音（每句话一声）
  state.lastVisit = Date.now();
  save();
  render();
  if (actualDelta > 0) {
    showFloat(`+${actualDelta}`, '#fbbf24');
    if (state.affection >= 60 && Math.random() < 0.5) {
      setTimeout(spawnHeart, 200);
    }
  } else {
    showFloat(`${actualDelta}`, '#ef4444');
  }
  document.getElementById('allActions').classList.remove('show');
  setTimeout(() => checkChoices(), 1500);
}

function showFloat(text, color) {
  const div = document.createElement('div');
  div.className = 'float-num';
  div.textContent = text;
  div.style.color = color;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1500);
}

// BGM
let audioCtx = null;
let musicPlaying = false;
let musicTimer = null;
function startMusic() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
    let idx = 0;
    function playNote() {
      if (!musicPlaying || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[idx % notes.length];
      gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.5);
      idx++;
      musicTimer = setTimeout(playNote, 800);
    }
    musicPlaying = true;
    playNote();
  } catch(e) {}
}
function stopMusic() {
  musicPlaying = false;
  if (musicTimer) clearTimeout(musicTimer);
  musicTimer = null;
}

document.getElementById('musicBtn').addEventListener('click', () => {
