<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇 · Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #fff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .nav { margin-bottom: 16px; align-self: flex-start; }
  .nav a { color: #fff; text-decoration: none; background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 6px; font-size: 14px; }
  h1 { font-size: 32px; margin-bottom: 8px; }
  .score { font-size: 18px; margin-bottom: 12px; opacity: 0.9; }
  canvas {
    background: #f0f0f0;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: 90vw;
  }
  .tip { margin-top: 10px; font-size: 13px; opacity: 0.7; }

  /* ============ 手机方向按钮 ============ */
  .dpad {
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px;
    gap: 8px;
    margin-top: 20px;
  }
  .dpad button {
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .dpad button:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  @media (min-width: 700px) {
    .dpad { display: none; }  /* 电脑端隐藏按钮 */
  }
</style>
</head>
<body>
  <div class="nav"><a href="../index.html">← 返回接单页</a></div>
  <h1>🐍 贪吃蛇</h1>
  <div class="score">得分: <span id="score">0</span> · 最高: <span id="best">0</span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="tip">电脑：方向键/WASD · 手机：滑动或点按钮 · 空格暂停</div>
  <div class="dpad">
    <button class="up" ontouchstart="setDir(0,-1)" onmousedown="setDir(0,-1)">▲</button>
    <button class="left" ontouchstart="setDir(-1,0)" onmousedown="setDir(-1,0)">◀</button>
    <button class="down" ontouchstart="setDir(0,1)" onmousedown="setDir(0,1)">▼</button>
    <button class="right" ontouchstart="setDir(1,0)" onmousedown="setDir(1,0)">▶</button>
  </div>
<script>
const GRID = 20, SPEED = 120;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
let snake, dir, nextDir, food, score, running, timer;
let best = +localStorage.getItem('snake-best') || 0;
bestEl.textContent = best;

window.setDir = function(x, y) {
  // 防止反向
  if ((x === 0 && y === -1 && dir.y === 1) ||
      (x === 0 && y === 1 && dir.y === -1) ||
      (x === -1 && y === 0 && dir.x === 1) ||
      (x === 1 && y === 0 && dir.x === -1)) return;
  nextDir = {x, y};
};

function init() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
  score = 0; running = true; scoreEl.textContent = '0';
  placeFood();
  if (timer) clearInterval(timer);
  timer = setInterval(loop, SPEED);
}
function placeFood() {
  while (true) {
    const x = Math.floor(Math.random() * (canvas.width / GRID));
    const y = Math.floor(Math.random() * (canvas.height / GRID));
    if (!snake.some(s => s.x === x && s.y === y)) { food = {x, y}; return; }
  }
}
function loop() {
  if (!running) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= canvas.width / GRID ||
      head.y < 0 || head.y >= canvas.height / GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    if (score > best) { best = score; localStorage.setItem('snake-best', best); bestEl.textContent = best; }
    return gameOver();
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; scoreEl.textContent = score; placeFood();
  } else snake.pop();
  draw();
}
function draw() {
  ctx.fillStyle = '#f0f0f0'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#2ecc71' : '#27ae60';
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
  ctx.fill();
}
function gameOver() {
  running = false; clearInterval(timer);
  alert('游戏结束！得分: ' + score + '\n点确定重新开始');
  init();
}

// 键盘控制
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup' || k === 'w') setDir(0, -1);
  else if (k === 'arrowdown' || k === 's') setDir(0, 1);
  else if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
  else if (k === 'arrowright' || k === 'd') setDir(1, 0);
  else if (k === ' ') running = !running;
});

// 触屏滑动控制
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) return;  // 滑动距离太短忽略
  if (absDx > absDy) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
}, { passive: false });

init();
</script>
</body>
</html>
