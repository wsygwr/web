<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 · Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    min-height: 100vh;
    font-family: "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .nav { margin-bottom: 16px; align-self: flex-start; }
  .nav a { color: #333; text-decoration: none; background: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 6px; font-size: 14px; }
  h1 { font-size: 48px; color: #776e65; margin-bottom: 12px; }
  .header { display: flex; justify-content: space-between; width: 360px; max-width: 90vw; margin-bottom: 12px; align-items: center; }
  .header > div:first-child { color: #776e65; font-size: 13px; }
  .score-box { background: #bbada0; color: #fff; padding: 6px 16px; border-radius: 6px; text-align: center; }
  .score-box .label { font-size: 11px; color: #eee4da; }
  .score-box .val { font-size: 22px; font-weight: bold; }
  .grid {
    background: #bbada0;
    border-radius: 8px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 10px;
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: repeat(4, 70px); grid-template-rows: repeat(4, 70px); }
  }
  .cell {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 4px;
    display: flex; justify-content: center; align-items: center;
    font-size: 32px; font-weight: bold; color: #776e65;
  }
  .tip { color: #776e65; font-size: 13px; margin-top: 12px; }
  button { margin-top: 8px; padding: 8px 20px; background: #8f7a66; color: #f9f6f2; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }

  /* ============ 手机方向按钮 ============ */
  .dpad {
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px;
    gap: 8px;
    margin-top: 16px;
  }
  .dpad button {
    background: #8f7a66;
    border: 2px solid #776e65;
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
  }
  .dpad button:active { background: #776e65; transform: scale(0.95); }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  @media (min-width: 700px) { .dpad { display: none; } }
</style>
</head>
<body>
  <div class="nav"><a href="../index.html">← 返回接单页</a></div>
  <h1>2048</h1>
  <div class="header">
    <div>合并到 <b>2048</b> 获胜</div>
    <div class="score-box"><div class="label">得分</div><div class="val" id="score">0</div></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="tip">电脑：方向键/WASD · 手机：滑动或点按钮</div>
  <div class="dpad">
    <button class="up" ontouchstart="doMove('up')" onmousedown="doMove('up')">▲</button>
    <button class="left" ontouchstart="doMove('left')" onmousedown="doMove('left')">◀</button>
    <button class="down" ontouchstart="doMove('down')" onmousedown="doMove('down')">▼</button>
    <button class="right" ontouchstart="doMove('right')" onmousedown="doMove('right')">▶</button>
  </div>
  <button onclick="init()">重新开始</button>
<script>
const SIZE = 4;
const COLORS = {
  2:'#eee4da', 4:'#ede0c8', 8:'#f2b179', 16:'#f59563',
  32:'#f67c5f', 64:'#f65e3b', 128:'#edcf72', 256:'#edcc61',
  512:'#edc850', 1024:'#edc53f', 2048:'#edc22e'
};
let board, score;
window.doMove = function(dir) { move(dir); };

function init() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; addRandom(); addRandom(); draw();
}
function addRandom() {
  const empty = [];
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) if (!board[y][x]) empty.push({x, y});
  if (!empty.length) return;
  const c = empty[Math.floor(Math.random() * empty.length)];
  board[c.y][c.x] = Math.random() < 0.9 ? 2 : 4;
}
function draw() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const div = document.createElement('div');
      div.className = 'cell';
      const v = board[y][x];
      if (v) {
        div.textContent = v;
        div.style.background = COLORS[v] || '#3c3a32';
        div.style.color = v >= 8 ? '#f9f6f2' : '#776e65';
        if (v >= 128) div.style.fontSize = '26px';
        if (v >= 1024) div.style.fontSize = '22px';
      }
      grid.appendChild(div);
    }
  }
  document.getElementById('score').textContent = score;
}
function move(dir) {
  const old = JSON.stringify(board);
  for (let i = 0; i < SIZE; i++) {
    let line = [];
    for (let j = 0; j < SIZE; j++) {
      if (dir === 'left') line.push(board[j][i]);
      else if (dir === 'right') line.unshift(board[j][i]);
      else if (dir === 'up') line.push(board[i][j]);
      else if (dir === 'down') line.unshift(board[i][j]);
    }
    line = mergeLine(line);
    for (let j = 0; j < SIZE; j++) {
      if (dir === 'left') board[j][i] = line[j];
      else if (dir === 'right') board[j][i] = line[SIZE-1-j];
      else if (dir === 'up') board[i][j] = line[j];
      else if (dir === 'down') board[i][j] = line[SIZE-1-j];
    }
  }
  if (JSON.stringify(board) !== old) { addRandom(); draw(); checkEnd(); }
}
function mergeLine(line) {
  let arr = line.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) { arr[i] *= 2; score += arr[i]; arr.splice(i+1, 1); }
  }
  while (arr.length < SIZE) arr.push(0);
  return arr;
}
function checkEnd() {
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (board[y][x] === 2048) { setTimeout(() => alert('🎉 恭喜达到 2048！'), 100); return; }
  }
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (!board[y][x]) return;
    if (x < SIZE-1 && board[y][x] === board[y][x+1]) return;
    if (y < SIZE-1 && board[y][x] === board[y+1][x]) return;
  }
  setTimeout(() => alert('游戏结束！得分: ' + score), 100);
}

// 键盘
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') move('left');
  else if (k === 'arrowright' || k === 'd') move('right');
  else if (k === 'arrowup' || k === 'w') move('up');
  else if (k === 'arrowdown' || k === 's') move('down');
});

// 触屏滑动
let touchStartX = 0, touchStartY = 0;
const gridEl = document.getElementById('grid');
gridEl.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
}, { passive: false });
gridEl.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
}, { passive: false });

init();
</script>
</body>
</html>
