<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 · Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #fff;
  }
  .nav { margin-bottom: 20px; }
  .nav a {
    color: #fff;
    text-decoration: none;
    background: rgba(0,0,0,0.2);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
  }
  h1 { font-size: 32px; margin-bottom: 10px; }
  .score { font-size: 18px; margin-bottom: 16px; opacity: 0.9; }
  canvas {
    background: #f0f0f0;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    max-width: 90vw;
  }
  .tip { margin-top: 16px; font-size: 13px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="nav"><a href="../index.html">← 返回接单页</a></div>
  <h1>🐍 贪吃蛇</h1>
  <div class="score">得分: <span id="score">0</span> · 最高: <span id="best">0</span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="tip">方向键 / WASD 控制 · 空格暂停</div>
<script>
const GRID = 20, SPEED = 120;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
let snake, dir, nextDir, food, score, running, timer;
let best = +localStorage.getItem('snake-best') || 0;
bestEl.textContent = best;

function init() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
  score = 0; running = true; scoreEl.textContent = '0';
  placeFood();
  if (timer) clearInterval(timer);
  timer = setInterval(loop, SPEED);
}
function placeFood() {
  while (true) {
    const x = Math.floor(Math.random() * (canvas.width / GRID));
    const y = Math.floor(Math.random() * (canvas.height / GRID));
    if (!snake.some(s => s.x === x && s.y === y)) { food = {x, y}; return; }
  }
}
function loop() {
  if (!running) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= canvas.width / GRID ||
      head.y < 0 || head.y >= canvas.height / GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    if (score > best) { best = score; localStorage.setItem('snake-best', best); bestEl.textContent = best; }
    return gameOver();
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; scoreEl.textContent = score; placeFood();
  } else snake.pop();
  draw();
}
function draw() {
  ctx.fillStyle = '#f0f0f0'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#2ecc71' : '#27ae60';
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
  ctx.fill();
}
function gameOver() {
  running = false; clearInterval(timer);
  alert('游戏结束！得分: ' + score + '\n点确定重新开始');
  init();
}
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if ((k === 'arrowup' || k === 'w') && dir.y !== 1) nextDir = {x: 0, y: -1};
  else if ((k === 'arrowdown' || k === 's') && dir.y !== -1) nextDir = {x: 0, y: 1};
  else if ((k === 'arrowleft' || k === 'a') && dir.x !== 1) nextDir = {x: -1, y: 0};
  else if ((k === 'arrowright' || k === 'd') && dir.x !== -1) nextDir = {x: 1, y: 0};
  else if (k === ' ') running = !running;
});
init();
</script>
</body>
</html>
